<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tycoon — Roblox Inspired</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game">
    <header>
      <h1>Tycoon</h1>
      <div id="cash">Cash: $0</div>
    </header>

    <main>
      <section id="play-area">
        <button id="cash-btn">+ $1</button>
        <div id="income">Income/sec: $0</div>
      </section>

      <aside id="shop">
        <h2>Shop</h2>
        <div id="items"></div>
      </aside>
    </main>

    <footer>
      <small>Simple tycoon demo • Host on GitHub Pages</small>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
